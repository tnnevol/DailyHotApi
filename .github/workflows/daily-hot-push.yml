name: Daily Hot News Push

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00 (UTC+8)
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 支持手动触发测试

jobs:
  push-hot-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: |
          # 验证 pnpm
          pnpm --version
          # 安装项目依赖
          pnpm install

      - name: Fetch and push hot news via DingTalk bot
        run: |
          # ========== 环境变量 ==========
          echo "===== 开始执行 ====="
          echo "时间：$(date +'%Y-%m-%d %H:%M:%S')"
          echo "API 地址：https://newsapi.tnnevol.cn"
          echo "========================"

          # 定义要推送的平台（6 个稳定平台）
          PLATFORMS="baidu weibo zhihu douyin bilibili sspai"

          # 统计成功推送数量
          SUCCESS_COUNT=0

          # 确保依赖已安装
          pnpm add @tnnevol/robot-ding axios

          # 遍历平台并推送钉钉feedCard消息
          for platform in $PLATFORMS; do
            echo ""
            echo "🔍 获取：$platform 并推送至钉钉"
            
            # 检查数据并推送
            RESPONSE=$(curl -s "https://newsapi.tnnevol.cn/$platform?token=${{ secrets.API_TOKEN }}" || echo '{"code":500}')
            CODE=$(echo "$RESPONSE" | jq -r '.code // 500')
            TITLE=$(echo "$RESPONSE" | jq -r '.title // "Unknown"')
            
            echo "  状态码：$CODE"
            
            if [ "$CODE" = "200" ]; then
              DATA=$(echo "$RESPONSE" | jq -r '.data // []')
              COUNT=$(echo "$DATA" | jq -r 'length')
              
              echo "  数据条数：$COUNT"
              
              if [ "$COUNT" -gt 0 ]; then
                echo "  ✅ 成功，推送 $TITLE 到钉钉"
                
                # 运行 JavaScript 脚本发送钉钉feedCard消息
                node scripts/dingtalk-push.js $platform
                
                if [ $? -eq 0 ]; then
                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  echo "  ✅ 钉钉推送成功"
                else
                  echo "  ❌ 钉钉推送失败"
                fi
              else
                echo "  ⚠️ 数据为空，跳过推送"
              fi
            else
              echo "  ❌ 获取数据失败：$CODE"
            fi
          done

          echo ""
          echo "===== 汇总 ====="
          echo "成功推送平台数：$SUCCESS_COUNT / 6"

          echo ""
          echo "===== 执行完成 ====="

env:
  DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
  DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
  API_TOKEN: ${{ secrets.API_TOKEN }}

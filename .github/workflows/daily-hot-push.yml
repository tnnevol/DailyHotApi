name: Daily Hot News Push

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00 (UTC+8)
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 支持手动触发测试

jobs:
  push-hot-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: |
          # 验证 pnpm
          pnpm --version
          # 安装项目依赖
          pnpm install

      - name: Push hot news via DingTalk bot
        run: |
          # ========== 环境变量 ==========
          echo "===== 开始执行 ====="
          echo "时间：$(date +'%Y-%m-%d %H:%M:%S')"
          echo "API 地址：https://newsapi.tnnevol.cn"
          echo "========================"

          # 定义要推送的平台（6 个稳定平台）
          PLATFORMS="baidu weibo zhihu douyin bilibili sspai"

          # 统计成功推送数量
          SUCCESS_COUNT=0

          # 构建钉钉推送包
          pnpm run build:sender
          
          # 遍历平台并直接调用钉钉推送脚本（由脚本负责获取数据和推送）
          for platform in $PLATFORMS; do
            echo ""
            echo "🔍 推送：$platform 至钉钉"
            
            # 运行构建后的钉钉推送包脚本（由脚本内部完成数据获取和推送）
            if pnpm run start:sender $platform; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              echo "  ✅ 钉钉推送成功"
            else
              echo "  ❌ 钉钉推送失败"
            fi
          done

          echo ""
          echo "===== 汇总 ====="
          echo "成功推送平台数：$SUCCESS_COUNT / 6"

          echo ""
          echo "===== 执行完成 ====="

env:
  DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
  DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
  API_TOKEN: ${{ secrets.API_TOKEN }}

name: Daily Hot News Push

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00 (UTC+8)
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 支持手动触发测试

jobs:
  push-hot-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: |
          # 验证 pnpm
          pnpm --version
          # 安装项目依赖（使用缓存加速，减少内存占用）
          pnpm install --frozen-lockfile

      - name: Push hot news via DingTalk bot
        run: |
          # ========== 环境变量 ==========
          echo "===== 开始执行 ====="
          echo "时间：$(date +'%Y-%m-%d %H:%M:%S')"
          echo "API 地址：https://newsapi.tnnevol.cn"
          echo "平台列表：${PLATFORMS}"
          echo "========================"

          # 构建钉钉推送包
          pnpm run build:sender

          # 运行构建后的钉钉推送包脚本（由脚本内部完成数据获取和推送）
          pnpm run start:sender

env:
  DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
  DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
  API_TOKEN: ${{ secrets.API_TOKEN }}
  PLATFORMS: ${{ vars.PLATFORMS || secrets.PLATFORMS || 'baidu,weibo,zhihu,douyin,bilibili,sspai,kuaishou,douban-movie,douban-group,tieba' }}

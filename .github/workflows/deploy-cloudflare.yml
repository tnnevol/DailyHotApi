name: Deploy to Cloudflare Workers

# 部署流程说明：
# - 开发在 dev 分支进行
# - 合并到 main 分支后自动触发生产部署
# - 支持手动触发（用于测试或紧急修复）

on:
  push:
    branches: [main]
    paths:
      - "workers-adapter.ts"
      - "src/workers-*.ts"
      - "src/adapters/*.ts"
      - "src/routes/*.ts"
      - ".github/workflows/deploy-cloudflare.yml"
      - "wrangler.toml"
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          pnpm install
          npm install -g wrangler

      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          [ -n "${{ secrets.KV_NAMESPACE_ID }}" ] || (echo "Missing KV_NAMESPACE_ID" && exit 1)

      - name: Generate wrangler.toml (production only)
        env:
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: |
          cat > wrangler.toml <<EOF
          name = "dailyhot-api-workers"
          compatibility_date = "2024-01-01"
          main = "workers-adapter.ts"

          [vars]
          ALLOWED_DOMAIN = "*"
          ALLOWED_HOST = "tnnevol.cn"

          [[kv_namespaces]]
          binding = "CACHE_KV"
          id = "$KV_NAMESPACE_ID"
          EOF

      - name: Build for Workers
        run: npx tsc --noEmit --skipLibCheck workers-adapter.ts

      - name: Deploy to Cloudflare Workers (production)
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show generated config (sanitized)
        run: |
          sed -e 's/id = ".*"/id = "***"/' wrangler.toml
        if: always()

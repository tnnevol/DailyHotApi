version: "3.8"

services:
  DailyhotApi:
    build:
      context: .
      target: runner
    ports:
      - "6688:6688"
    volumes:
      - "./logs:/app/logs"
    environment:
      - PORT=6688
      - API_TOKEN=${API_TOKEN:-your-default-token-change-in-production}
    user: "114514"
    restart: always

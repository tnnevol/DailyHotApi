services:
  dailyhotApi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dailyhotApi
    ports:
      - "6688:6688"
    volumes:
      - "./logs:/app/logs"
    environment:
      - TZ=Asia/Shanghai
      - PORT=6688
      - API_TOKEN=${API_TOKEN:-your-secret-token-here}

    # 使用说明：
    # 1. 复制此文件为 docker-compose.yml
    # 2. 修改 API_TOKEN 为你的实际 Token
    # 3. 运行：docker-compose up -d
    # 4. 或设置环境变量：API_TOKEN=xxx docker-compose up -d
    user: "114514"
    restart: always
